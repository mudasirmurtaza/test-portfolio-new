<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>body{margin:0;background:#fff}img{display:block;width:100%}#status{font:14px monospace;padding:6px}</style></head>
<body>
<div id="status">loading…</div>
<img id="out"/>
<script type="module">
const s = document.getElementById('status');
try {
  const { PDFiumLibrary } = await import('https://esm.sh/@hyzyla/pdfium@2.1.5');
  s.textContent='lib loaded';
  const buf = await (await fetch('../uploads/resume_reattach-1782486596360.pdf')).arrayBuffer();
  const wasmBinary = await (await fetch('https://esm.sh/@hyzyla/pdfium@2.1.5/dist/pdfium.wasm')).arrayBuffer();
  const lib = await PDFiumLibrary.init({ wasmBinary });
  const doc = await lib.loadDocument(new Uint8Array(buf));
  const page = doc.getPage(0);
  const img = await page.render({ scale: 2, render: 'bitmap' });
  // img.data is RGBA Uint8Array, img.width/height
  const c = document.createElement('canvas'); c.width=img.width; c.height=img.height;
  const ctx=c.getContext('2d');
  const id=ctx.createImageData(img.width,img.height); id.data.set(img.data); ctx.putImageData(id,0,0);
  document.getElementById('out').src = c.toDataURL('image/png');
  s.textContent=''; window.__done=true;
  doc.destroy(); lib.destroy();
} catch(e){ s.textContent='ERR: '+e.message; window.__done='err:'+e.message; }
</script>
</body>
</html>
